<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decklist Fixer</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1d2027;
    --panel2: #23272f;
    --border: #333844;
    --text: #e6e8ec;
    --muted: #9aa1ad;
    --accent: #6ea8fe;
    --accent-strong: #4b8dfd;
    --ok: #4caf7d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 24px 16px 48px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 { font-size: 26px; margin: 0 0 6px; }
  .langs { display: flex; gap: 6px; flex-shrink: 0; }
  .langbtn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 11px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .langbtn:hover { color: var(--text); border-color: var(--accent); }
  .langbtn.active {
    background: var(--accent-strong);
    color: #fff;
    border-color: var(--accent-strong);
  }
  .sub { color: var(--muted); margin: 0; }
  .sub code {
    background: var(--panel2);
    padding: 1px 6px;
    border-radius: 5px;
    color: var(--text);
    font-size: 13px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    margin: 18px 0;
  }
  .check {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    color: var(--muted);
  }
  .check input { width: 16px; height: 16px; accent-color: var(--accent-strong); cursor: pointer; }
  .section-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 0 0 18px;
  }
  .section-panel[hidden] { display: none; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .section-list { display: flex; flex-wrap: wrap; gap: 8px 20px; }
  .section-list .check { color: var(--text); }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; }
  .col-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .col-head label { font-weight: 600; }
  .count { color: var(--muted); font-size: 12px; }
  textarea {
    width: 100%;
    min-height: 380px;
    resize: vertical;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font: 13px/1.55 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    tab-size: 4;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea[readonly] { background: var(--panel2); }
  .btnrow { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
  button {
    background: var(--accent-strong);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent); }
  button.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  button.ghost:hover { color: var(--text); border-color: var(--accent); }
  .toast { color: var(--ok); font-size: 13px; opacity: 0; transition: opacity .15s; }
  .toast.show { opacity: 1; }
  footer { margin-top: 28px; color: var(--muted); font-size: 12px; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <h1>🃏 Decklist Fixer</h1>
      <div class="langs" id="langs">
        <button class="langbtn" data-lang="de">DE</button>
        <button class="langbtn" data-lang="en">EN</button>
        <button class="langbtn" data-lang="fr">FR</button>
      </div>
    </div>
    <p class="sub" id="sub"></p>
  </header>

  <div class="controls">
    <label class="check">
      <input type="checkbox" id="keepSections" checked>
      <span id="keepLabel"></span>
    </label>
  </div>

  <div class="section-panel" id="sectionPanel" hidden>
    <div class="section-title" id="sectionTitle"></div>
    <div class="section-list" id="sectionList"></div>
  </div>

  <div class="grid">
    <div class="col">
      <div class="col-head">
        <label for="input" id="inputLabel">Eingabe</label>
        <span class="count" id="inCount"></span>
      </div>
      <textarea id="input" spellcheck="false"></textarea>
    </div>

    <div class="col">
      <div class="col-head">
        <label for="output" id="outputLabel">Ausgabe</label>
        <span class="count" id="outCount"></span>
      </div>
      <textarea id="output" readonly spellcheck="false"></textarea>
      <div class="btnrow">
        <button id="copyBtn">Ergebnis kopieren</button>
        <span class="toast" id="toast">Kopiert!</span>
      </div>
    </div>
  </div>

  <footer>
    <span id="footerText"></span>
  </footer>
</div>

<script>
/*
 * Pure Parsing-Logik. Bewusst als eigenständige Funktion gehalten, damit sie
 * unverändert von einem Node-Testskript oder z. B. einem Discord-Bot
 * wiederverwendet werden kann (via `module.exports` unten).
 */
(function (root) {
  // Am Zeilenende: Set-Code in Klammern + Kartennummer, z. B. " (J25) 85"
  var SET_AND_NUMBER = /\s*\([A-Za-z0-9]{2,6}\)\s+[A-Za-z0-9★†.\-]+\s*$/;
  // Foil-/Etch-Marker sowie freistehender Set-Code ohne Nummer
  var FOIL = /\s*\*[FE]\*/gi;
  var SET_ONLY = /\s*\([A-Za-z0-9]{2,6}\)\s*$/;
  // Moxfield-artige Tags am Ende: "#tag" bis Zeilenende
  var MOX_TAGS = /\s*(?:#\S+\s*)+$/;
  // Kartenzeile: beginnt mit Anzahl, optional "x" (1x), dann Name
  var CARD_LINE = /^\s*(\d+)\s*[xX]?\s+(.+?)\s*$/;

  // Bekannte Abschnitts-Überschriften. removable=false bedeutet: darf nie als
  // ganzer Block (mit Karten) entfernt werden (Maindeck bzw. Commander).
  var SECTION_DEFS = [
    { key: "deck",        name: "Deck",        re: /^deck$/i,          removable: false },
    { key: "commander",   name: "Commander",   re: /^commanders?$/i,   removable: false },
    { key: "companion",   name: "Companion",   re: /^companion$/i,     removable: true  },
    { key: "sideboard",   name: "Sideboard",   re: /^sideboard$/i,     removable: true  },
    { key: "maybeboard",  name: "Maybeboard",  re: /^maybe(?:board)?$/i, removable: true },
    { key: "considering", name: "Considering", re: /^considering$/i,   removable: true  },
    { key: "tokens",      name: "Tokens",      re: /^tokens?$/i,       removable: true  },
    { key: "about",       name: "About",       re: /^about$/i,         removable: true  }
  ];

  // Erkennt eine Abschnitts-Überschrift. Toleriert Zusätze wie "Sideboard (15)"
  // oder "Commander:". Gibt {key,name,removable} oder null zurück.
  function sectionKey(line) {
    var norm = String(line).trim().replace(/\s*\(.*\)\s*$/, "").replace(/:\s*$/, "").trim();
    if (!norm) return null;
    for (var i = 0; i < SECTION_DEFS.length; i++) {
      if (SECTION_DEFS[i].re.test(norm)) return SECTION_DEFS[i];
    }
    return null;
  }

  // Geordnete, eindeutige Liste der in der Liste vorkommenden Abschnitte.
  function detectSections(text) {
    var lines = String(text).replace(/\r\n?/g, "\n").split("\n");
    var seen = {};
    var out = [];
    for (var i = 0; i < lines.length; i++) {
      var s = sectionKey(lines[i]);
      if (s && !seen[s.key]) {
        seen[s.key] = true;
        out.push({ key: s.key, name: s.name, removable: s.removable });
      }
    }
    return out;
  }

  function fixLine(line) {
    var m = line.match(CARD_LINE);
    if (!m) return null; // keine Kartenzeile
    var qty = m[1];
    var rest = m[2];
    // Reihenfolge wichtig: trailing Marker (Foil, Tags) zuerst weg, damit
    // der am Zeilenende verankerte Set-Code-Regex danach greift.
    rest = rest.replace(FOIL, "");
    rest = rest.replace(MOX_TAGS, "");
    rest = rest.replace(SET_AND_NUMBER, "");
    rest = rest.replace(SET_ONLY, "");
    rest = rest.trim();
    if (!rest) return null;
    return qty + " " + rest;
  }

  // opts: { keepSections: bool, removeSections: [keys] }
  // Rückwärtskompatibel: ein Boolean wird als {keepSections: bool} gelesen.
  function fixDecklist(text, opts) {
    if (typeof opts === "boolean" || opts == null) opts = { keepSections: !!opts };
    var keepSections = !!opts.keepSections;
    var removeList = opts.removeSections || [];
    var removeSet = {};
    for (var r = 0; r < removeList.length; r++) removeSet[removeList[r]] = true;

    var lines = String(text).replace(/\r\n?/g, "\n").split("\n");
    var out = [];
    var skipping = false; // innerhalb eines komplett zu entfernenden Abschnitts
    for (var i = 0; i < lines.length; i++) {
      var raw = lines[i];
      var trimmed = raw.trim();

      var sec = trimmed === "" ? null : sectionKey(trimmed);
      if (sec) {
        // Abschnitts-Überschrift steuert, ob der folgende Block übersprungen wird.
        if (removeSet[sec.key]) {
          skipping = true;
          continue; // Überschrift verwerfen
        }
        skipping = false;
        if (keepSections) out.push(trimmed);
        continue;
      }

      if (skipping) continue; // Zeilen des entfernten Abschnitts fallen weg

      if (trimmed === "") {
        // Leerzeilen nur behalten, wenn Überschriften behalten werden;
        // sonst nicht zwei leere hintereinander erzeugen.
        if (keepSections) {
          if (out.length && out[out.length - 1] !== "") out.push("");
        }
        continue;
      }
      var fixed = fixLine(raw);
      if (fixed !== null) {
        out.push(fixed);
      } else if (keepSections) {
        out.push(trimmed);
      }
      // sonst: sonstige Zeile (z. B. Deckname) verwerfen
    }
    // trailing Leerzeilen abschneiden
    while (out.length && out[out.length - 1] === "") out.pop();
    return out.join("\n");
  }

  function countCards(text) {
    var lines = String(text).split("\n");
    var n = 0;
    for (var i = 0; i < lines.length; i++) {
      var m = lines[i].match(CARD_LINE);
      if (m) n += parseInt(m[1], 10) || 0;
    }
    return n;
  }

  var api = {
    fixDecklist: fixDecklist,
    fixLine: fixLine,
    countCards: countCards,
    detectSections: detectSections,
    sectionKey: sectionKey
  };
  if (typeof module !== "undefined" && module.exports) module.exports = api;
  else root.DecklistFixer = api;
})(typeof window !== "undefined" ? window : this);
</script>

<script>
(function () {
  if (typeof document === "undefined") return;
  var F = window.DecklistFixer;
  var input = document.getElementById("input");
  var output = document.getElementById("output");
  var keep = document.getElementById("keepSections");
  var inCount = document.getElementById("inCount");
  var outCount = document.getElementById("outCount");
  var copyBtn = document.getElementById("copyBtn");
  var toast = document.getElementById("toast");
  var sectionPanel = document.getElementById("sectionPanel");
  var sectionTitle = document.getElementById("sectionTitle");
  var sectionList = document.getElementById("sectionList");

  // Merkt sich pro Abschnitts-Key, ob "komplett entfernen" angehakt ist.
  var removeState = {};
  // Signatur der zuletzt gerenderten entfernbaren Abschnitte (key-Reihenfolge),
  // damit das Panel nicht bei jedem Tastendruck neu aufgebaut wird.
  var lastSig = null;

  // Beispielblock im Eingabe-Placeholder ist sprachneutral (MTG-Export-Format).
  var EXAMPLE =
    "\n\nDeck\n1 Island (J25) 85\n4 Lightning Bolt (STA) 42\n" +
    "2x Sol Ring (LTC) 284\n\nSideboard\n1 Fable of the Mirror-Breaker (NEO) 141";

  var I18N = {
    de: {
      sub: 'Entfernt Set-Code und Kartennummer aus einer Deckliste — aus ' +
        '<code>1 Island (J25) 85</code> wird <code>1 Island</code>. Alles bleibt im Browser.',
      keep: "Abschnitts-Überschriften behalten (Deck, Sideboard, Commander …)",
      inputLabel: "Eingabe",
      outputLabel: "Ausgabe",
      inputLead: "Deckliste hier einfügen …",
      outputPh: "… erscheint hier automatisch",
      copy: "Ergebnis kopieren",
      copied: "Kopiert!",
      footer: "Läuft komplett offline im Browser · funktioniert auch als lokale Datei",
      cards: function (n) { return n + (n === 1 ? " Karte" : " Karten"); },
      panelTitle: "Erkannte Abschnitte",
      removeWhole: function (name) { return name + " komplett entfernen (mit Karten)"; }
    },
    en: {
      sub: 'Removes set code and collector number from a decklist — ' +
        '<code>1 Island (J25) 85</code> becomes <code>1 Island</code>. Everything stays in your browser.',
      keep: "Keep section headers (Deck, Sideboard, Commander …)",
      inputLabel: "Input",
      outputLabel: "Output",
      inputLead: "Paste your decklist here …",
      outputPh: "… appears here automatically",
      copy: "Copy result",
      copied: "Copied!",
      footer: "Runs entirely offline in your browser · also works as a local file",
      cards: function (n) { return n + (n === 1 ? " card" : " cards"); },
      panelTitle: "Detected sections",
      removeWhole: function (name) { return "Remove entire " + name + " (with cards)"; }
    },
    fr: {
      sub: "Supprime le code d'extension et le numéro de collection d'une decklist — " +
        "<code>1 Island (J25) 85</code> devient <code>1 Island</code>. Tout reste dans votre navigateur.",
      keep: "Conserver les en-têtes de section (Deck, Sideboard, Commander …)",
      inputLabel: "Entrée",
      outputLabel: "Sortie",
      inputLead: "Collez votre decklist ici …",
      outputPh: "… apparaît ici automatiquement",
      copy: "Copier le résultat",
      copied: "Copié !",
      footer: "Fonctionne entièrement hors ligne dans le navigateur · marche aussi en fichier local",
      // En français, 0 et 1 prennent le singulier.
      cards: function (n) { return n + (n <= 1 ? " carte" : " cartes"); },
      panelTitle: "Sections détectées",
      removeWhole: function (name) { return "Supprimer tout le " + name + " (cartes incluses)"; }
    }
  };

  var lang = "de";

  function pickInitialLang() {
    var saved = null;
    try { saved = localStorage.getItem("dlf-lang"); } catch (e) {}
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "en").slice(0, 2).toLowerCase();
    return I18N[nav] ? nav : "en";
  }

  function applyLang(next) {
    lang = I18N[next] ? next : "en";
    var t = I18N[lang];
    document.documentElement.lang = lang;
    document.getElementById("sub").innerHTML = t.sub;
    document.getElementById("keepLabel").textContent = t.keep;
    document.getElementById("inputLabel").textContent = t.inputLabel;
    document.getElementById("outputLabel").textContent = t.outputLabel;
    input.placeholder = t.inputLead + EXAMPLE;
    output.placeholder = t.outputPh;
    copyBtn.textContent = t.copy;
    toast.textContent = t.copied;
    document.getElementById("footerText").textContent = t.footer;
    var btns = document.querySelectorAll(".langbtn");
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("active", btns[i].getAttribute("data-lang") === lang);
    }
    try { localStorage.setItem("dlf-lang", lang); } catch (e) {}
    renderPanel(true); // Panel-Labels in neuer Sprache neu aufbauen
    render();
  }

  // Baut das Panel mit "komplett entfernen"-Häkchen für die erkannten,
  // entfernbaren Abschnitte. force=true erzwingt Neuaufbau (z. B. Sprachwechsel).
  function renderPanel(force) {
    var t = I18N[lang];
    var removable = F.detectSections(input.value).filter(function (s) {
      return s.removable;
    });
    var sig = lang + "|" + removable.map(function (s) { return s.key; }).join(",");
    if (!force && sig === lastSig) return;
    lastSig = sig;

    sectionTitle.textContent = t.panelTitle;
    sectionList.innerHTML = "";
    if (!removable.length) {
      sectionPanel.hidden = true;
      return;
    }
    sectionPanel.hidden = false;
    removable.forEach(function (s) {
      var label = document.createElement("label");
      label.className = "check";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!removeState[s.key];
      cb.setAttribute("data-key", s.key);
      cb.addEventListener("change", function () {
        removeState[s.key] = cb.checked;
        render();
      });
      var span = document.createElement("span");
      span.textContent = t.removeWhole(s.name);
      label.appendChild(cb);
      label.appendChild(span);
      sectionList.appendChild(label);
    });
  }

  function render() {
    var t = I18N[lang];
    renderPanel(false);
    // Nur Keys entfernen, die aktuell auch erkannt werden.
    var present = {};
    F.detectSections(input.value).forEach(function (s) {
      if (s.removable) present[s.key] = true;
    });
    var removeSections = [];
    for (var k in removeState) {
      if (removeState[k] && present[k]) removeSections.push(k);
    }
    var result = F.fixDecklist(input.value, {
      keepSections: keep.checked,
      removeSections: removeSections
    });
    output.value = result;
    inCount.textContent = t.cards(F.countCards(input.value));
    outCount.textContent = t.cards(F.countCards(result));
  }

  input.addEventListener("input", render);
  keep.addEventListener("change", render);

  document.getElementById("langs").addEventListener("click", function (e) {
    var btn = e.target.closest ? e.target.closest(".langbtn") : null;
    if (btn) applyLang(btn.getAttribute("data-lang"));
  });

  copyBtn.addEventListener("click", function () {
    var text = output.value;
    function done() {
      toast.classList.add("show");
      setTimeout(function () { toast.classList.remove("show"); }, 1400);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fallback);
    } else {
      fallback();
    }
    function fallback() {
      output.removeAttribute("readonly");
      output.select();
      try { document.execCommand("copy"); } catch (e) {}
      output.setAttribute("readonly", "readonly");
      window.getSelection().removeAllRanges();
      done();
    }
  });

  applyLang(pickInitialLang());
})();
</script>
</body>
</html>
